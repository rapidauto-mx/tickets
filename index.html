<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RapidAuto · Nuevo ticket</title>
  <style>
    :root {
      --navy: #0f1e3c;
      --gold: #f0c040;
      --bg:   #f0f2f5;
      --w:    #ffffff;
      --bdr:  #d1d5db;
      --mut:  #6b7280;
      --err:  #dc2626;
      --ok:   #15803d;
      --okbg: #f0fdf4;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: #111; font-size: 15px; }

    .hdr { background: var(--navy); padding: 18px 20px; text-align: center; }
    .hdr-brand { font-size: 22px; font-weight: 800; color: #fff; }
    .hdr-brand span { color: var(--gold); }
    .hdr-sub { font-size: 12px; color: rgba(255,255,255,.5); margin-top: 2px; }

    .body { padding: 16px; max-width: 560px; margin: 0 auto; }

    .card { background: var(--w); border-radius: 12px; border: 1px solid var(--bdr); margin-bottom: 12px; overflow: hidden; }
    .card-head { background: var(--navy); color: #fff; padding: 9px 16px; font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; }
    .card-body { padding: 14px 16px; }

    textarea {
      width: 100%; min-height: 200px; resize: vertical;
      padding: 12px; font-size: 14px; line-height: 1.6;
      border: 1.5px solid var(--bdr); border-radius: 8px;
      font-family: inherit; color: #111; background: var(--w);
    }
    textarea:focus { outline: none; border-color: var(--navy); }

    .dropzone {
      border: 2px dashed var(--bdr); border-radius: 10px;
      padding: 28px 16px; text-align: center; cursor: pointer;
      transition: all .2s; background: var(--bg);
    }
    .dropzone:hover, .dropzone.over { border-color: var(--navy); background: #e8edf5; }
    .dropzone-icon { font-size: 32px; margin-bottom: 8px; }
    .dropzone-txt  { font-size: 14px; color: var(--mut); }
    .dropzone-sub  { font-size: 12px; color: #9ca3af; margin-top: 4px; }
    input[type=file] { display: none; }

    .file-list { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
    .file-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; background: var(--okbg);
      border: 1px solid #86efac; border-radius: 8px;
    }
    .file-icon { font-size: 18px; flex-shrink: 0; }
    .file-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--ok); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-size { font-size: 11px; color: #6b7280; flex-shrink: 0; }
    .file-del  { background: none; border: none; cursor: pointer; font-size: 16px; color: #9ca3af; padding: 0 2px; flex-shrink: 0; }
    .file-del:hover { color: var(--err); }

    .banner { background: #fef2f2; border: 1px solid #fca5a5; color: var(--err); padding: 11px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 12px; display: none; }

    .prog { background: var(--w); border: 1px solid var(--bdr); border-radius: 12px; padding: 20px 16px; margin-bottom: 12px; display: none; }
    .prog-lbl   { font-size: 13px; font-weight: 600; color: var(--navy); text-align: center; margin-bottom: 10px; }
    .prog-track { background: var(--bg); border-radius: 4px; height: 7px; overflow: hidden; }
    .prog-fill  { height: 7px; background: var(--navy); border-radius: 4px; transition: width .3s; width: 0%; }
    .prog-sub   { font-size: 12px; color: var(--mut); text-align: center; margin-top: 7px; }

    .btn-send {
      width: 100%; padding: 16px; background: var(--navy); color: #fff;
      border: none; border-radius: 10px; font-size: 16px; font-weight: 700;
      cursor: pointer; margin-bottom: 32px; letter-spacing: .02em;
    }
    .btn-send:disabled { opacity: .4; cursor: not-allowed; }

    #ok { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; background: var(--bg); }
    .ok-icon  { font-size: 56px; margin-bottom: 10px; }
    .ok-title { font-size: 20px; font-weight: 800; color: var(--navy); margin-bottom: 6px; }
    .ok-id    { font-size: 28px; font-weight: 900; color: var(--navy); background: var(--w); border: 2px solid var(--navy); border-radius: 10px; padding: 10px 24px; margin: 10px 0 14px; letter-spacing: 2px; }
    .ok-sub   { font-size: 13px; color: var(--mut); line-height: 1.7; max-width: 280px; }
    .btn-new  { margin-top: 20px; padding: 13px 28px; background: var(--navy); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>

<div id="ok">
  <div class="ok-icon">✅</div>
  <div class="ok-title">Ticket enviado</div>
  <div class="ok-id" id="ok-id">RPA-2025-0001</div>
  <div class="ok-sub">El analista recibió el ticket con todos los documentos adjuntos.</div>
  <button class="btn-new" onclick="resetForm()">Enviar otro ticket</button>
</div>

<div id="main">
  <div class="hdr">
    <div class="hdr-brand">Rapid<span>Auto</span></div>
    <div class="hdr-sub">Nuevo ticket de prospecto</div>
  </div>

  <div class="body">
    <div class="banner" id="banner"></div>
    <div class="prog" id="prog">
      <div class="prog-lbl">Enviando ticket...</div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
      <div class="prog-sub" id="prog-sub">Preparando...</div>
    </div>

    <div class="card">
      <div class="card-head">Datos del ticket</div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:11px;">
        <div style="display:flex;flex-direction:column;gap:4px;">
          <label style="font-size:12px;font-weight:700;color:var(--mut);">PERFIL <span style="color:var(--err)">*</span></label>
          <input type="text" id="perfil" placeholder="Nombre del prospecto"
            style="padding:10px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-size:15px;font-family:inherit;color:#111;background:var(--w);-webkit-appearance:none;">
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;">
          <label style="font-size:12px;font-weight:700;color:var(--mut);">LOTE <span style="color:var(--err)">*</span></label>
          <input type="text" id="lote" placeholder="Nombre del lote o agencia"
            style="padding:10px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-size:15px;font-family:inherit;color:#111;background:var(--w);-webkit-appearance:none;">
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;">
          <label style="font-size:12px;font-weight:700;color:var(--mut);">VENDEDOR <span style="color:var(--err)">*</span></label>
          <input type="text" id="vendedor" placeholder="Nombre del vendedor"
            style="padding:10px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-size:15px;font-family:inherit;color:#111;background:var(--w);-webkit-appearance:none;">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">Conversación de WhatsApp</div>
      <div class="card-body">
        <textarea id="chat" placeholder="Pega aquí la conversación de WhatsApp con los datos del prospecto..."></textarea>
      </div>
    </div>

    <div class="card">
      <div class="card-head">Documentos</div>
      <div class="card-body">
        <input type="file" id="file-input" multiple accept=".pdf,.jpg,.jpeg,.png,.heic"
          onchange="agregarArchivos(this.files)">
        <div class="dropzone" id="dropzone"
          onclick="document.getElementById('file-input').click()"
          ondragover="dz(event,'over')" ondragleave="dz(event,'out')" ondrop="dz(event,'drop')">
          <div class="dropzone-icon">📎</div>
          <div class="dropzone-txt">Toca aquí para adjuntar documentos</div>
          <div class="dropzone-sub">PDF, JPG, PNG · máx 8 MB por archivo</div>
        </div>
        <div class="file-list" id="file-list"></div>
      </div>
    </div>

    <button class="btn-send" id="btn-send" onclick="enviar()">Enviar ticket →</button>
  </div>
</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby91VtVIArOQ92LNw_UEg9kXZFt3SR0g6ESaekBcfWPRNMzJ9TPej3RNWqKS5sDviJ-/exec';

var archivos = [];

function dz(e, tipo) {
  e.preventDefault();
  var el = document.getElementById('dropzone');
  if (tipo === 'over') el.classList.add('over');
  else if (tipo === 'out') el.classList.remove('over');
  else { el.classList.remove('over'); agregarArchivos(e.dataTransfer.files); }
}

function iconoTipo(name) {
  var ext = (name.split('.').pop() || '').toLowerCase();
  return (ext === 'pdf') ? '📄' : ['jpg','jpeg','png','heic'].includes(ext) ? '🖼️' : '📎';
}

function fmt(b) {
  return b < 1048576 ? Math.round(b/1024) + ' KB' : (b/1048576).toFixed(1) + ' MB';
}

function agregarArchivos(files) {
  Array.from(files).forEach(function(f) {
    if (f.size > 8 * 1048576) { alert('"' + f.name + '" supera 8 MB.'); return; }
    if (!archivos.find(function(x) { return x.name === f.name && x.size === f.size; }))
      archivos.push(f);
  });
  renderLista();
  document.getElementById('file-input').value = '';
}

function quitarArchivo(i) { archivos.splice(i, 1); renderLista(); }

function renderLista() {
  document.getElementById('file-list').innerHTML = archivos.map(function(f, i) {
    return '<div class="file-item">' +
      '<span class="file-icon">' + iconoTipo(f.name) + '</span>' +
      '<span class="file-name">' + f.name + '</span>' +
      '<span class="file-size">' + fmt(f.size) + '</span>' +
      '<button class="file-del" onclick="quitarArchivo(' + i + ')">✕</button>' +
    '</div>';
  }).join('');
}

function toBase64(file) {
  return new Promise(function(res, rej) {
    var r = new FileReader();
    r.onload  = function() { res(r.result.split(',')[1]); };
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function post(payload) {
  return fetch(SCRIPT_URL, {
    method:'POST', headers:{'Content-Type':'text/plain'},
    body: JSON.stringify(payload), redirect:'follow'
  }).then(function(r){ return r.text(); })
    .then(function(t){ try { return JSON.parse(t); } catch(e){ throw new Error('Error de servidor.'); } });
}

function setProgress(pct, msg) {
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-sub').textContent  = msg;
}

function enviar() {
  var perfil   = document.getElementById('perfil').value.trim();
  var lote     = document.getElementById('lote').value.trim();
  var vendedor = document.getElementById('vendedor').value.trim();
  var chat     = document.getElementById('chat').value.trim();
  var banner   = document.getElementById('banner');

  var faltantes = [];
  if (!perfil)   { faltantes.push('Perfil');   document.getElementById('perfil').style.borderColor   = '#dc2626'; }
  else             document.getElementById('perfil').style.borderColor   = '';
  if (!lote)     { faltantes.push('Lote');     document.getElementById('lote').style.borderColor     = '#dc2626'; }
  else             document.getElementById('lote').style.borderColor     = '';
  if (!vendedor) { faltantes.push('Vendedor'); document.getElementById('vendedor').style.borderColor = '#dc2626'; }
  else             document.getElementById('vendedor').style.borderColor = '';

  if (faltantes.length) {
    banner.textContent = 'Campos obligatorios: ' + faltantes.join(', ') + '.';
    banner.style.display = 'block';
    window.scrollTo({top:0, behavior:'smooth'});
    return;
  }
  banner.style.display = 'none';
  document.getElementById('btn-send').disabled = true;
  document.getElementById('prog').style.display = 'block';
  window.scrollTo({top:0, behavior:'smooth'});

  var carpetaId, ticketId;
  setProgress(10, 'Creando ticket...');

  post({ action:'crearTicket', perfil:perfil, lote:lote, vendedor:vendedor, chat:chat })
  .then(function(r) {
    if (!r.ok) throw new Error(r.error || 'Error al crear ticket.');
    ticketId  = r.ticketId;
    carpetaId = r.carpetaId;
    var i = 0, total = archivos.length;
    function siguiente() {
      if (i >= total) return Promise.resolve();
      var f = archivos[i++];
      setProgress(10 + Math.round(i/(total+1)*86), 'Subiendo ' + f.name + '...');
      return toBase64(f).then(function(b64) {
        return post({ action:'subirArchivo', carpetaId:carpetaId,
          nombreArchivo:f.name, base64:b64, mimeType:f.type||'application/octet-stream' });
      }).then(function(r2) {
        if (!r2.ok) throw new Error('Error subiendo ' + f.name);
        return siguiente();
      });
    }
    return siguiente();
  })
  .then(function() {
    setProgress(100, 'Listo');
    document.getElementById('ok-id').textContent = ticketId;
    document.getElementById('main').style.display = 'none';
    document.getElementById('ok').style.display   = 'flex';
  })
  .catch(function(err) {
    document.getElementById('prog').style.display = 'none';
    document.getElementById('btn-send').disabled  = false;
    banner.textContent = 'Error: ' + err.message;
    banner.style.display = 'block';
    window.scrollTo({top:0, behavior:'smooth'});
  });
}

function resetForm() {
  document.getElementById('main').style.display = 'block';
  document.getElementById('ok').style.display   = 'none';
  document.getElementById('prog').style.display = 'none';
  document.getElementById('btn-send').disabled  = false;
  document.getElementById('perfil').value   = '';
  document.getElementById('lote').value     = '';
  document.getElementById('vendedor').value = '';
  document.getElementById('chat').value     = '';
  archivos = [];
  renderLista();
  window.scrollTo({top:0, behavior:'smooth'});
}
</script>
</body>
</html>
